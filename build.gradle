plugins {
    id 'java-library'
    id 'io.qameta.allure' version '2.12.0'
}

repositories {
    mavenCentral()
}

allure {
    report {
        version.set("2.32.0")
    }
    adapter {
        aspectjWeaver.set(true)
        frameworks {
            junit5 {
                adapterVersion.set("2.32.0")
            }
        }
    }
}

dependencies {
    testImplementation(
            "io.rest-assured:rest-assured:6.0.0",
            "tools.jackson.core:jackson-databind:3.1.0",
            "io.rest-assured:json-schema-validator:6.0.0",
            "io.qameta.allure:allure-rest-assured:2.31.0",
            "net.datafaker:datafaker:2.5.4",
            "org.junit.jupiter:junit-jupiter:5.14.3",
            "org.assertj:assertj-core:3.27.7",
            "org.slf4j:slf4j-simple:2.0.17"
    )
    testRuntimeOnly(
            'org.junit.platform:junit-platform-launcher'
    )
}

tasks.withType(Test) {
    useJUnitPlatform()
    systemProperties(System.getProperties())

    testLogging {
        lifecycle {
            events "started", "skipped", "failed", "standard_error", "standard_out"
            exceptionFormat "short"
        }
    }
}